version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: proshop-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - proshop-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: proshop-backend
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/proshop
    depends_on:
      - mongodb
    networks:
      - proshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    depends_on:
      - backend
    networks:
      - proshop-network

  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-network

  prometheus:
    image: prom/prometheus:latest
    container_name: proshop-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - proshop-network

  grafana:
    image: grafana/grafana:latest
    container_name: proshop-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - proshop-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: proshop-node-exporter
    ports:
      - "9100:9100"
    networks:
      - proshop-network

volumes:
  mongodb_data:
  grafana_data:

networks:
  proshop-network:
    driver: bridge