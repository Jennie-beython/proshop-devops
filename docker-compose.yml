version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: proshop-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - proshop-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: proshop-backend
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/proshop
    depends_on:
      - mongodb
    networks:
      - proshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    depends_on:
      - backend
    networks:
      - proshop-network

  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-network

volumes:
  mongodb_data:

networks:
  proshop-network:
    driver: bridge