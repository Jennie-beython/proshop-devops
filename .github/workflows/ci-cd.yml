name: CI/CD ProShop

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installation des dépendances
        run: npm install

      - name: Vérification des secrets dans le code
        run: |
          echo "Vérification qu'aucun secret n'est exposé..."
          ! grep -r "password" --include="*.js" backend/ | grep -v "node_modules" | grep -v "//.*password"
          echo "OK - Aucun secret exposé"

      - name: Build image backend
        run: docker build -t proshop-backend -f backend/Dockerfile .

      - name: Build image frontend
        run: docker build -t proshop-frontend -f frontend/Dockerfile ./frontend

      - name: Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: proshop-backend
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Vérification des images
        run: docker images